name: OrangeFox - 构建

# Credits to:
# https://github.com/TeamWin
# https://gitlab.com/OrangeFox
# https://github.com/azwhikaru for Recovery Builder Template
# And all Contributors in every repositories I used
# 调教说明
# Lime优化与编辑修复
# 在原有基础上添加对OF14.1的支持

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox 版本'
        required: true
        default: '12.1'
        type: choice
        options:
        - 14.1
        - 12.1
        - 11.0
        - 10.0
      DEVICE_TREE:
        description: 'OrangeFox设备树'
        required: true
        default: 'https://github.com/xyyyico/device-5g-L39_IVVI_4_64_V80M60BP_NZW_BT30.git'
      DEVICE_TREE_BRANCH:
        description: 'OrangeFox设备树分支'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: '指定设备路径'
        required: true
        default: 'device/5g/L39_IVVI_4_64_V80M60BP_NZW_BT30'
      DEVICE_NAME:
        description: '指定设备代号'
        required: true
        default: 'L39_IVVI_4_64_V80M60BP_NZW_BT30'
      BUILD_TARGET:
        description: '构建目标'
        required: true
        default: 'recovery'
        type: choice
        options:
        - recovery
        - boot
      DN:
        description: '设备名称'
        required: true
        default: 'IVVI L39'
        type: string

jobs:
  build:
    name: 🏠 由 ${{ github.actor }} 构建REC
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: 🧱 构建配置
      run: |
        echo "构建配置"
        echo "设备代号: ${{ inputs.DEVICE_NAME }}"
        echo "设备名称: ${{ inputs.DN }}"
        echo "OrangeFox版本: ${{ inputs.MANIFEST_BRANCH }}"
        echo "指定设备路径: ${{ inputs.DEVICE_PATH }}"
        echo "构建: ${{ inputs.BUILD_TARGET }}"

    - name: 📥 下载原厂boot.img (用于自动修补)
      run: |
        mkdir -p ${{ inputs.DEVICE_PATH }}/prebuilt/stock
        wget -O ${{ inputs.DEVICE_PATH }}/prebuilt/stock/boot.img \
        https://github.com/xyyyico/device-5g-L39_IVVI_4_64_V80M60BP_NZW_BT30/releases/download/stock/boot.img
        ls -l ${{ inputs.DEVICE_PATH }}/prebuilt/stock/

    - name: ✅ 检查
      uses: actions/checkout@v4
              
    - name: 🧹 清理
      uses: rokibhasansagar/slimhub_actions@main

    - name: 🚢 Swap空间
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24
      
    - name: 🤖 构建环境
      run: |
        sudo apt install aria2 -y
        git clone https://gitlab.com/OrangeFox/misc/scripts.git -b master
        cd scripts
        sudo bash setup/android_build_env.sh
        # 全局git免询问配置
        git config --global credential.helper '!gh auth git-credential'
        export GIT_TERMINAL_PROMPT=0
      
    - name: 🏙️ 初始化清单
      if: inputs.MANIFEST_BRANCH == '11.0' || inputs.MANIFEST_BRANCH == '12.1' || inputs.MANIFEST_BRANCH == '14.1'
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
        cd ${GITHUB_WORKSPACE}/OrangeFox
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
        git clone https://gitlab.com/OrangeFox/sync.git -b master
        cd sync
        ./orangefox_sync.sh --branch ${{ inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}

    - name: 🌳 克隆设备树
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./${{ inputs.DEVICE_PATH }}
        cd ${{ inputs.DEVICE_PATH }}
        echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV

    - name: 🦊 构建OrangeFox
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        set +e
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export FOX_BUILD_TYPE=Official
        export FOX_PATCH_STOCK_BOOT=true
        export STOCK_BOOT_PATH=${{ inputs.DEVICE_PATH }}/prebuilt/stock/boot.img
        set -e
        lunch twrp_${{ inputs.DEVICE_NAME }}-eng && mka ${{ inputs.BUILD_TARGET }}image

    - name: 🧰 自动修补原厂boot (方案2：开机进系统+按键进REC)
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        # 使用镜像加速地址
        git clone https://mirror.ghproxy.com/https://github.com/OrangeFoxRecovery/OF-Scripts.git of_script
        chmod +x of_script/patch-boot-of.sh
        cp out/target/product/${{ inputs.DEVICE_NAME }}/recovery.img .
        cp ${{ inputs.DEVICE_PATH }}/prebuilt/stock/boot.img .
        ./of_script/patch-boot-of.sh boot.img recovery.img of_patched_boot.img
        mv of_patched_boot.img out/target/product/${{ inputs.DEVICE_NAME }}/
        ls -l out/target/product/${{ inputs.DEVICE_NAME }}/*.img

    - name: 💿 整理镜像
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/upload_artifacts

        FOX_DIR="${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}"
        OUT_DIR="${FOX_DIR}/out/target/product/${{ inputs.DEVICE_NAME }}"

        echo "🔍 正在从以下绝对路径搜寻文件："
        echo "$OUT_DIR"

        if [ ! -d "$OUT_DIR" ]; then
            echo "❌ 严重错误：输出目录不存在！"
            echo "可能是 inputs.DEVICE_NAME (${{ inputs.DEVICE_NAME }}) 不对，或者 Manifest 分支不对。"
            exit 1
        fi

        find "$OUT_DIR" -maxdepth 1 -name "*.img" -exec cp {} ${GITHUB_WORKSPACE}/upload_artifacts/ \;
        find "$OUT_DIR" -maxdepth 1 -name "*.zip" -exec cp {} ${GITHUB_WORKSPACE}/upload_artifacts/ \;

        if [ -z "$(ls -A ${GITHUB_WORKSPACE}/upload_artifacts/)" ]; then
           echo "❌ 未寻找到镜像，请检查BoardConfig.mk或设备树配置"
           exit 1
        else
           echo "✅ 找到文件"
           ls -R ${GITHUB_WORKSPACE}/upload_artifacts/
        fi

    - name: 🧶 设置发行版参数
      run: |
        echo "BUILD_DATE=$(TZ=Asia/Shanghai date +%Y%m%d)" >> $GITHUB_ENV
        
        DEVICE_TREE_URL="${{ inputs.DEVICE_TREE }}"
        if [[ "${DEVICE_TREE_URL}" == *.git ]]; then
          DEVICE_TREE_URL="${DEVICE_TREE_URL%.git}"
        fi
        echo "DEVICE_TREE_URL=${DEVICE_TREE_URL}" >> $GITHUB_ENV

    - name: 🎥 上传至发行版
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        files: upload_artifacts/*
        name: ${{ inputs.DEVICE_NAME }} // ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          <h1 align="center">
            <img src="https://orangefox.download/fox.svg" height="40" style="vertical-align:bottom"/> 
            OrangeFox ${{ inputs.MANIFEST_BRANCH }}
          </h1>
          🚀 构建: ${{ github.run_id }}<br>
          📱 设备: ${{ inputs.DN }}<br>
          🔢 设备代号: ${{ inputs.DEVICE_NAME }}<br>
          🦊 OrangeFox版本: ${{ inputs.MANIFEST_BRANCH }}<br>
          📅 构建日期: ${{ env.BUILD_DATE }}<br>
          <br>
          <strong>✅ 状态: 构建成功 (Build Successfully)</strong>
