name: Build OrangeFox + Patch Boot
on:
  workflow_dispatch:

env:
  FOX_BRANCH: "12.1"
  DEVICE_CODENAME: "L39_IVVI_4_64_V80M60BP_NZW_BT30"
  DT_REPO: "xyyyico/device-5g-L39_IVVI_4_64_V80M60BP_NZW_BT30"
  DT_BRANCH: "main"
  STOCK_BOOT_URL: "https://github.com/xyyyico/device-5g-L39_IVVI_4_64_V80M60BP_NZW_BT30/releases/download/stock/boot.img"
  ALLOW_MISSING_DEPENDENCIES: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 编译橙狐+自动修补原厂boot
        uses: kinguser981/OrangeFox-Recovery-Builder-2024@main
        with:
          fox_branch: "12.1"
          device_tree: "https://github.com/${{ env.DT_REPO }}.git"
          dt_branch: "${{ env.DT_BRANCH }}"
          stock_boot_link: "${{ env.STOCK_BOOT_URL }}"
          patch_stock_boot: true
