name: OrangeFox - 构建
on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'OrangeFox 版本'
        required: true
        default: '12.1'
        type: choice
        options:
        - 14.1
        - 12.1
        - 11.0
        - 10.0
      DEVICE_TREE:
        description: 'OrangeFox设备树'
        required: true
        default: 'https://github.com/xyyyico/device-5g-L39_IVVI_4_64_V80M60BP_NZW_BT30.git'
      DEVICE_TREE_BRANCH:
        description: 'OrangeFox设备树分支'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: '指定设备路径'
        required: true
        default: 'device/5g/L39_IVVI_4_64_V80M60BP_NZW_BT30'
      DEVICE_NAME:
        description: '指定设备代号'
        required: true
        default: 'L39_IVVI_4_64_V80M60BP_NZW_BT30'
      BUILD_TARGET:
        description: '构建目标'
        required: true
        default: 'recovery'
        type: choice
        options:
        - recovery
        - boot
      DN:
        description: '设备名称'
        required: true
        default: 'IVVI L39'
        type: string

jobs:
  build:
    name: 🏠 由 ${{ github.actor }} 构建REC
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: 🧱 构建配置
      run: |
        echo "设备代号: ${{ inputs.DEVICE_NAME }}"
        echo "OrangeFox版本: ${{ inputs.MANIFEST_BRANCH }}"

    - name: 📥 下载原厂boot.img
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/stock_boot
        wget -O ${GITHUB_WORKSPACE}/stock_boot/boot.img \
        https://github.com/xyyyico/device-5g-L39_IVVI_4_64_V80M60BP_NZW_BT30/releases/download/stock/boot.img

    - name: ✅ 代码检出
      uses: actions/checkout@v4

    - name: 🧹 环境清理
      uses: rokibhasansagar/slimhub_actions@main

    - name: 🚢 扩容Swap
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24

    - name: 🤖 编译环境部署
      run: |
        sudo apt install aria2 -y
        git clone https://gitlab.com/OrangeFox/misc/scripts.git -b master
        cd scripts
        sudo bash setup/android_build_env.sh

    - name: 📦 缓存OrangeFox源码
      uses: actions/cache@v3
      with:
        path: ${GITHUB_WORKSPACE}/OrangeFox
        key: fox-src-${{ inputs.MANIFEST_BRANCH }}

    - name: 🏙️ 同步OrangeFox源码
      if: inputs.MANIFEST_BRANCH == '11.0' || inputs.MANIFEST_BRANCH == '12.1' || inputs.MANIFEST_BRANCH == '14.1'
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/OrangeFox
        cd ${GITHUB_WORKSPACE}/OrangeFox
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
        git clone https://gitlab.com/OrangeFox/sync.git -b master
        cd sync
        ./orangefox_sync.sh --branch ${{ inputs.MANIFEST_BRANCH }} --path ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}

    - name: 🌳 拉取设备树
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        rm -rf ./${{ inputs.DEVICE_PATH }}
        git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./${{ inputs.DEVICE_PATH }}

    - name: 🦊 编译OrangeFox REC（出错休眠24h）
      run: |
        cd ${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export FOX_BUILD_TYPE=Official
        lunch twrp_${{ inputs.DEVICE_NAME }}-eng && mka ${{ inputs.BUILD_TARGET }}image || {
          echo "====编译出错，休眠24小时，修改vendorsetup.sh提交后重新运行作业===="
          sleep 86400
        }

    - name: 💿 整理全部镜像(容错不报错)
      run: |
        mkdir -p ${GITHUB_WORKSPACE}/upload_artifacts
        STOCK_BOOT=${GITHUB_WORKSPACE}/stock_boot/boot.img
        OUT=${GITHUB_WORKSPACE}/OrangeFox/fox_${{ inputs.MANIFEST_BRANCH }}/out/target/product/${{ inputs.DEVICE_NAME }}
        if [ -f "${OUT}/recovery.img" ];then
          cp ${OUT}/recovery.img ${GITHUB_WORKSPACE}/upload_artifacts/
          cp ${STOCK_BOOT} ${GITHUB_WORKSPACE}/upload_artifacts/of_patched_boot.img
        fi
        [ -d "$OUT" ] && find "$OUT" -maxdepth 1 \( -name "*.zip" -o -name "*.img" \) -exec cp {} ${GITHUB_WORKSPACE}/upload_artifacts/ \; || true
        ls ${GITHUB_WORKSPACE}/upload_artifacts/

    - name: 🧶 打包参数
      run: |
        echo "BUILD_DATE=$(TZ=Asia/Shanghai date +%Y%m%d)" >> $GITHUB_ENV

    - name: 🎥 自动发布Release
      uses: softprops/action-gh-release@v2
      if: success()
      with:
        files: upload_artifacts/*
        name: ${{ inputs.DEVICE_NAME }}-${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          OrangeFox ${{ inputs.MANIFEST_BRANCH }} | 设备:${{ inputs.DN }}
